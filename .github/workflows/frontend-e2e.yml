name: Frontend E2E

on:
  push:
    paths:
      - 'frontend/vite-project/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    paths:
      - 'frontend/vite-project/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vite-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vite-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/vite-project/playwright-report
          retention-days: 14

      - name: Check Playwright Test Results dir
        if: always()
        id: check_test_results
        run: |
          if [ -d "test-results" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright Test Results
        if: always() && steps.check_test_results.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/vite-project/test-results
          retention-days: 14

